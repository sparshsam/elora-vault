name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22.x"
  NPM_VERSION: "11.12.1"
  CI_DATABASE_URL: "postgresql://placeholder:password@localhost:5432/elora"
  CI_SUPABASE_URL: "https://placeholder.supabase.co"
  CI_PLACEHOLDER_KEY: "placeholder-key"
  CI_WALLETCONNECT_PROJECT_ID: "00000000000000000000000000000000"

jobs:
  lint-and-typecheck:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          npm install -g npm@${{ env.NPM_VERSION }}
          npm ci

      - name: Generate Prisma client
        run: npm run postinstall

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript
        run: npm run typecheck

  build:
    name: Build
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          npm install -g npm@${{ env.NPM_VERSION }}
          npm ci

      - name: Generate Prisma client
        run: npm run postinstall

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || env.CI_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL || env.CI_DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || env.CI_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || env.CI_PLACEHOLDER_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || env.CI_PLACEHOLDER_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://localhost:3000' }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID || env.CI_WALLETCONNECT_PROJECT_ID }}
          NEXT_PUBLIC_BASE_RPC_URL: ${{ secrets.NEXT_PUBLIC_BASE_RPC_URL || 'https://mainnet.base.org' }}
          NEXT_PUBLIC_BASE_SEPOLIA_RPC_URL: ${{ secrets.NEXT_PUBLIC_BASE_SEPOLIA_RPC_URL || 'https://sepolia.base.org' }}
